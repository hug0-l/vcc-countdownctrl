- id: S-4
  title: 'P1-3: 選擇性 WSS/HTTPS 加密支援'
  column: done
  priority: P1
  depends_on:
  - S-1
  instructions: |-
    ## Goal
    在 `signal_server.py` 中支援可選的 WSS/HTTPS 加密模式。通過環境變數啟用，不影響現有明文模式。

    ## Files
    - `/Users/hug0.nef/PycharmProjects/vcc-clipper/signal_server.py` (Read + Edit)

    ## Spec
    ### 新增環境變數支援
    ```python
    # 在 main() 開始處
    import os
    USE_TLS = os.environ.get("CLIPPER_TLS", "").lower() in ("1", "true", "yes")
    TLS_CERT = os.environ.get("CLIPPER_TLS_CERT", "cert.pem")
    TLS_KEY = os.environ.get("CLIPPER_TLS_KEY", "key.pem")
    ```

    ### 自簽憑證生成腳本（可選）
    在 `main()` 中，若 `USE_TLS=True` 但憑證不存在，可用 `cryptography` 或 OpenSSL CLI 提示：
    ```python
    if USE_TLS:
        import ssl
        if not os.path.exists(TLS_CERT) or not os.path.exists(TLS_KEY):
            _log('TLS', f'Certificate not found: {TLS_CERT} / {TLS_KEY}')
            _log('TLS', 'Generate with: openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes')
            _log('TLS', 'or set CLIPPER_TLS=0 to run without encryption')
            return
        ssl_context = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
        ssl_context.load_cert_chain(TLS_CERT, TLS_KEY)
    else:
        ssl_context = None
    ```

    ### 修改 server 啟動
    ```python
    # WebSocket with optional TLS
    ws_kwargs = {"host": "0.0.0.0", "port": 8765}
    if ssl_context:
        ws_kwargs["ssl"] = ssl_context
        _log('STARTUP', f'WSS (encrypted) on wss://0.0.0.0:8765')
    else:
        _log('STARTUP', f'WS (plain) on ws://0.0.0.0:8765')

    async with websockets.serve(handler, **ws_kwargs):
        ...
    ```

    同樣修改 HTTP server。

    ### 使用方式
    ```bash
    # 明文模式（預設）
    python3 signal_server.py

    # 加密模式
    openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes
    CLIPPER_TLS=1 python3 signal_server.py
    ```

    ## Requirements
    1. 預設維持明文（向後相容）
    2. 設環境變數 `CLIPPER_TLS=1` 自動啟用 WSS/WSS
    3. 憑證不存在時提示用戶生成，不 crash
    4. 不引入新依賴（使用 Python 內建 ssl 模組）

    ## Acceptance Criteria
    - [ ] 預設 `python3 signal_server.py` 依然走 ws://
    - [ ] `CLIPPER_TLS=1 python3 signal_server.py` 走 wss://
    - [ ] 憑證不存在時顯示提示，不 crash
