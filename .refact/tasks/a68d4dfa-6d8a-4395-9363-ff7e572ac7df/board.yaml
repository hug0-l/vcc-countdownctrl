    ## Goal
    在 `signal_server.py` 的 mini HTTP server 中加入 REST API 端點，讓後端服務可以 HTTP 存取 Clipper 房間資料。

    ## Files
    - `/Users/hug0.nef/PycharmProjects/vcc-clipper/signal_server.py` (Read + Edit)

    ## Spec
    在 `_mini_http` 函式中加入路由判斷支援以下端點：

    ### Endpoints
    ```
    GET  /api/health
         → {"status":"ok","version":"1.1.0","uptime":123,"activeRooms":2,"onlinePeers":5}

    GET  /api/rooms/:room/state
         → {"noticePosts":[],"checklists":[],"keyManagements":[],"deletedNoticeIds":[],...}

    POST /api/rooms/:room/notice        Body: {title, content, category, tags, author}
    PUT  /api/rooms/:room/notice?id=X   Body: {title, content, ...}
    DELETE /api/rooms/:room/notice?id=X

    POST /api/rooms/:room/checklist        Body: {board}
    PUT  /api/rooms/:room/checklist?id=X   Body: {title, ...}
    DELETE /api/rooms/:room/checklist?id=X

    POST /api/rooms/:room/keymgmt        Body: {entry}
    PUT  /api/rooms/:room/keymgmt?id=X   Body: {label, ...}
    DELETE /api/rooms/:room/keymgmt?id=X

    GET  /api/rooms/:room/chats
         → {"messages":[...]}
    ```

    ### 實作方式
    在 `_mini_http` 中解析 request line → 路由判斷：
    ```python
    path = parts[1]
    if path.startswith("/api/"):
        # REST API handling
        # parse method, path, query params, body
        # return JSON response
    else:
        # existing static file serving
    ```

    ### 要求
    1. 向後相容：不影響 WS 功能、不影響靜態檔案服務
    2. CORS: `Access-Control-Allow-Origin: *`
    3. Content-Type: application/json
    4. 錯誤處理：room 不存在回 404、JSON parse 錯誤回 400

    ## Acceptance Criteria
    - [ ] GET /api/health 回傳正確狀態 JSON
    - [ ] GET /api/rooms/1234/state 回傳房間資料
    - [ ] POST notice 後 GET state 確認新增
    - [ ] DELETE notice 後 GET state 確認刪除
    - [ ] 靜態檔案服務正常
