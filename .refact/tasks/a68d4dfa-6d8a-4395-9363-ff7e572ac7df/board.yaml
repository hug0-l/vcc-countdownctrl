- id: B-1
  title: 修復 clipper-sdk.js sendChat relay broadcast 問題
  column: done
  priority: P1
  depends_on: []
  instructions: "## Goal\n修復 ClipperSDK `sendChat()` 的 relay broadcast 邏輯，讓聊天訊息能正確廣播到所有房間成員。同時 fix countdownctrl 中的 SDK 副本。\n\n## Problem\nSDK 的 `sendChat()` 目前只發送一次 `relay-data` 沒有 `to` 目標：\n```javascript\n_send({type: 'relay-data', room, data: {type: 'chat', ...}});\n// 缺少 to 欄位 → 伺服器回 \"relay target not found\"\n```\n\n但 Clipper 信令伺服器要求 `relay-data` 必須有 `to`（目標 peerId）。\n\n## Fix Needed\n### 1. 在 `clipper-sdk.js` 中找出 `sendChat()` 方法\n位置約 line 193-215，將其改為**遍歷所有已知 peers** 發送 relay-data：\n\n```javascript\nsendChat(text) {\n    if (!text || !this._connected || !this._state.room) return false;\n    const msg = {\n        from: this.displayName || this._peerId,\n        text: text,\n        timestamp: Date.now(),\n    };\n    // Optimistic local store\n    this._state.chatMessages.push(msg);\n    this._emit('chat', msg);\n    \n    // Broadcast to ALL known peers via relay-data (WS relay mode)\n    const payload = {type: 'chat', from: msg.from, text: msg.text, timestamp: msg.timestamp};\n    const peers = this._peers || new Map();\n    let sent = false;\n    for (const [peerId] of peers) {\n        this._send({\n            type: 'relay-data',\n            room: this._state.room,\n            to: peerId,\n            data: payload\n        });\n        sent = true;\n    }\n    // Also send chat-backup for server persistence\n    this._send({\n        type: 'chat-backup',\n        room: this._state.room,\n        text: msg.text,\n        from: msg.from,\n        timestamp: msg.timestamp\n    });\n    return sent || true; // true even if no peers (will be server-backed up)\n}\n```\n\n### 2. 確認 SDK 有追蹤 peers 列表\n查找 `room_peers`、`peer-joined`、`peer-left` 事件處理，確認 `this._peers` 或對應的 peers 集合有被正確維護。\n\n```javascript\n// 在 constructor 中初始化\nthis._peers = new Map();\n\n// 在 room_peers handler 中更新\ncase 'room_peers':\n    this._peers = new Map(data.peers.map(p => [p.peerId, p]));\n    // ...\n\ncase 'peer-joined':\n    this._peers.set(data.peerId, data);\n    // ...\n\ncase 'peer-left':\n    this._peers.delete(data.peerId);\n    // ...\n```\n\n如果目前沒有 `_peers` 追蹤，請加上。\n\n### 3. 同步修復到 countdownctrl\n修好 vcc-clipper 的 `clipper-sdk.js` 後，複製到 countdownctrl：\n```bash\ncp /Users/hug0.nef/PycharmProjects/vcc-clipper/clipper-sdk.js /Users/hug0.nef/PycharmProjects/vcc-countdownctrl/static/clipper-sdk.js\n```\n\n## Tests\n1. 啟動 signal_server.py\n2. 打開兩個 clipper 客戶端在同一個房間\n3. 用 countdownctrl 的 Clipper IM 分頁發送訊息\n4. 確認其他客戶端收到訊息，無「relay target not found」錯誤\n\n## Acceptance Criteria\n- [ ] sendChat 正確廣播給所有房間成員\n- [ ] 無「relay target not found」錯誤\n- [ ] countdownctrl SDK 副本同步更新"
