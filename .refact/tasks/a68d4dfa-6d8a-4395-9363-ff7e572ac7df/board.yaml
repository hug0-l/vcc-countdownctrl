    ### Fix server `generate` handler missing response
    - Priority: medium
    - Target files: signal_server.py

    The server's `generate` handler (signal_server.py line 652-653) generates a random room code but never sends it back. Add `await websocket.send(json.dumps({"type": "generated", "room": code}))` to complete the protocol flow.

    ### Fix server `register-name` handler placement bug
    - Priority: medium
    - Target files: signal_server.py

    The `register-name` message handling code (lines 1166-1185) is incorrectly placed inside the `elif msg_type == 'ntp-config':` block. It should be a separate `elif msg_type == 'register-name':` block.

    ## Risks
    - SDK is 820 lines (spec says ~300-500), but the extra lines are from comprehensive protocol handling of all 48 message types

