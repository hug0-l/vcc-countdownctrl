  instructions: |-
    ## Goal
    建立 `clipper-sdk.js`，一個輕量級 JavaScript SDK，將 Clipper WebSocket 協議封裝成事件驅動 API，外部應用只需 3 行程式碼接入。

    ## Files
    - `/Users/hug0.nef/PycharmProjects/vcc-clipper/clipper-sdk.js` (Create)

    ## Spec
    ### API 設計
    ```javascript
    // 3 行接入！
    const clipper = new ClipperSDK({
        server: 'ws://localhost:8765',
        room: '1234',
        displayName: '計時器'
    });

    // 事件監聽
    clipper.on('connected', () => { });
    clipper.on('disconnected', () => { });
    clipper.on('chat', (msg) => { console.log(msg.from, msg.text); });
    clipper.on('notice', (post) => { });
    clipper.on('peer-joined', (peer) => { });
    clipper.on('peer-left', (peerId) => { });
    clipper.on('state', (state) => { });
    clipper.on('error', (err) => { });
    clipper.on('readonly', (enabled) => { });

    // 方法
    clipper.connect();
    clipper.disconnect();
    clipper.sendChat(text);          // → boolean
    clipper.createNotice(title, content, category, tags);
    clipper.editNotice(id, updates);
    clipper.deleteNotice(id);
    clipper.createChecklist(title, category, tags, color);
    clipper.addChecklistItem(boardId, text);
    clipper.toggleChecklistItem(boardId, itemId, checked);
    clipper.deleteChecklistItem(boardId, itemId);
    clipper.createKeyEntry(label, key, url, program);
    clipper.editKeyEntry(id, updates);
    clipper.deleteKeyEntry(id);
    clipper.toggleKeyActive(id);
    clipper.fetchState();            // → Promise<state>
    clipper.getNotices();
    clipper.getChecklists();
    clipper.getKeyEntries();
    clipper.getChatMessages();
    ```

    ### 內部實現
    1. WebSocket 連線管理（connect/disconnect）
    2. 自動 join room + 處理 joined 回應
    3. 自動請求 room-state
    4. 自動 ping/pong 心跳（每 10s）
    5. 指數退避重連（2s→4s→8s→...→30s max）
    6. 離線唯讀保護：斷線時設 `readOnly = true`，觸發 `readonly` 事件
    7. 事件發射器（on/off）
    8. 無外部依賴

    ### 使用方式
    ```html
    <script src="clipper-sdk.js"></script>
    ```

    ## Requirements
    1. 單一 JS 檔案，無外部依賴
    2. 約 300-500 行
    3. ES6 語法（class, arrow functions）
    4. 錯誤不 throw，改發射 error 事件

    ## Acceptance Criteria
    - [ ] clipper-sdk.js 已建立
    - [ ] 可正確連線 + join room
    - [ ] sendChat 可發送
    - [ ] on('chat') 可接收
    - [ ] 自動重連機制
    - [ ] 離線唯讀保護
