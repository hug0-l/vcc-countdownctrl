- id: P2P-1
  title: Add WebRTC P2P to clipper-sdk.js — match native parity
  column: done
  priority: P1
  depends_on: []
  instructions: "## Goal\nAdd WebRTC P2P (RTCPeerConnection + DataChannel) to `clipper-sdk.js` so it matches native `clipper.html`. P2P first, WS relay fallback.\n\n## Files\n- `/Users/hug0.nef/PycharmProjects/vcc-clipper/clipper-sdk.js` (Edit — source of truth)\n\n## Background\nNative clipper.html has full WebRTC:\n```javascript\n// native: auto P2P with lower peerId creating offer\nconnectToPeer(targetPeerId) → startWebRTCPeer(targetPeerId, isInitiator, offer)\n  → RTCPeerConnection with STUN\n  → DataChannel 'vcc'\n  → offer/answer via WS signaling\n  → ICE candidate exchange\n// On DC open → P2P for chat/files\n// On DC fail → WS relay fallback\n```\n\nSDK currently only uses WS relay. Add the same P2P logic while keeping full backward compatibility.\n\n## Spec\n\n### Constructor additions\n```javascript\nconstructor(opts) {\n  // ... existing code ...\n  this.stunServer = opts.stunServer || 'stun:stun.l.google.com:19302';\n  // P2P peer state stored in this._peers Map (already exists)\n  // Enhance _peers entries with: pc, dc, connected, relay\n}\n```\n\n### Message handler additions (in `_handleMessage`)\n```javascript\ncase 'offer':\n  this._startWebRTCPeer(data.from, false, data.data);\n  break;\n\ncase 'answer':\n  const peerState = this._peers.get(data.from);\n  if (peerState && peerState.pc && peerState.pc.remoteDescription === null) {\n    peerState.pc.setRemoteDescription(new RTCSessionDescription(data.data));\n  }\n  break;\n\ncase 'ice-candidate':\n  const peerState2 = this._peers.get(data.from);\n  if (peerState2 && peerState2.pc) {\n    peerState2.pc.addIceCandidate(new RTCIceCandidate(data.data));\n  }\n  break;\n```\n\n### New methods\n\n```javascript\n_connectToPeer(targetPeerId) {\n  if (this._peers.has(targetPeerId) || targetPeerId === this._peerId) return;\n  if (this._peerId < targetPeerId) {\n    this._startWebRTCPeer(targetPeerId, true, null);\n  } else {\n    this._peers.set(targetPeerId, { pc: null, dc: null, connected: false, relay: false });\n  }\n}\n\n_startWebRTCPeer(targetPeerId, isInitiator, remoteOffer) {\n  // Skip if PC already exists\n  const existing = this._peers.get(targetPeerId);\n  if (existing && existing.pc) return;\n  if (remoteOffer && existing) {\n    try { existing.pc.close(); } catch (_) {}\n    this._peers.delete(targetPeerId);\n  }\n  \n  const pc = new RTCPeerConnection({ iceServers: [{ urls: this.stunServer }] });\n  \n  if (isInitiator) {\n    const dc = pc.createDataChannel('clipper', { ordered: true });\n    this._setupDataChannel(dc, targetPeerId);\n  }\n  \n  pc.ondatachannel = (event) => {\n    this._setupDataChannel(event.channel, targetPeerId);\n  };\n  \n  pc.onicecandidate = (event) => {\n    if (event.candidate && this._state.room) {\n      this._send({\n        type: 'ice-candidate', room: this._state.room,\n        to: targetPeerId, data: { candidate: event.candidate.candidate, sdpMid: event.candidate.sdpMid, sdpMLineIndex: event.candidate.sdpMLineIndex }\n      });\n    }\n  };\n  \n  pc.oniceconnectionstatechange = () => {\n    if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {\n      const ps = this._peers.get(targetPeerId);\n      if (ps) ps.connected = true;\n      this._emit('transport', { peerId: targetPeerId, mode: 'p2p' });\n    } else if (pc.iceConnectionState === 'failed' || pc.iceConnectionState === 'disconnected') {\n      const ps = this._peers.get(targetPeerId);\n      if (ps) { ps.relay = true; ps.connected = true; }\n      this._emit('transport', { peerId: targetPeerId, mode: 'relay' });\n    }\n  };\n  \n  // Store\n  this._peers.set(targetPeerId, { pc, dc: isInitiator ? null : null, connected: false, relay: false });\n  \n  // Initiator: create offer\n  if (isInitiator) {\n    pc.createOffer()\n      .then(offer => pc.setLocalDescription(offer))\n      .then(() => {\n        if (this._state.room && pc.localDescription) {\n          this._send({\n            type: 'offer', room: this._state.room, to: targetPeerId,\n            data: { type: pc.localDescription.type, sdp: pc.localDescription.sdp }\n          });\n        }\n      })\n      .catch(e => console.warn('[SDK:P2P] createOffer error', e));\n  } else if (remoteOffer) {\n    pc.setRemoteDescription(new RTCSessionDescription(remoteOffer))\n      .then(() => pc.createAnswer())\n      .then(answer => pc.setLocalDescription(answer))\n      .then(() => {\n        if (this._state.room && pc.localDescription) {\n          this._send({\n            type: 'answer', room: this._state.room, to: targetPeerId,\n            data: { type: pc.localDescription.type, sdp: pc.localDescription.sdp }\n          });\n        }\n      })\n      .catch(e => console.warn('[SDK:P2P] createAnswer error', e));\n  }\n}\n\n_setupDataChannel(dc, peerId) {\n  dc.binaryType = 'arraybuffer';\n  \n  dc.onopen = () => {\n    const ps = this._peers.get(peerId);\n    if (ps) { ps.dc = dc; ps.connected = true; }\n    this._emit('transport', { peerId, mode: 'p2p' });\n  };\n  \n  dc.onclose = () => {\n    // Fallback to relay\n    const ps = this._peers.get(peerId);\n    if (ps) { ps.dc = null; ps.relay = true; ps.connected = true; }\n    this._emit('transport', { peerId, mode: 'relay' });\n  };\n  \n  // Handle incoming DC messages (chat)\n  dc.onmessage = (event) => {\n    try {\n      const msg = JSON.parse(event.data);\n      if (msg.type === 'chat') {\n        this._state.chatMessages.push({ from: msg.from, text: msg.text, timestamp: msg.timestamp });\n        this._emit('chat', { from: msg.from, text: msg.text, timestamp: msg.timestamp });\n      } else if (msg.type === 'file-meta') {\n        // Same as relay-data file-meta handler\n        this._fileReceives.set(msg.fileId, {\n          fileId: msg.fileId, name: msg.name, size: msg.size, chunks: msg.chunks || 0,\n          sha256: msg.sha256 || null, received: 0, blobs: [], chunkCount: 0,\n          from: peerId, status: 'receiving'\n        });\n        this._emit('file-meta', { fileId: msg.fileId, name: msg.name, size: msg.size, chunks: msg.chunks, from: peerId });\n      } else if (msg.type === 'file-done') {\n        // Same as relay-data file-done handler\n        const entry = this._fileReceives.get(msg.fileId);\n        if (entry && entry.status !== 'cancelled') {\n          entry.status = 'done';\n          const blob = new Blob(entry.blobs);\n          this._fileReceives.delete(msg.fileId);\n          this._emit('file-done', { fileId: msg.fileId, name: entry.name, blob, size: entry.size, from: entry.from });\n        }\n      }\n    } catch (_) {}\n  };\n}\n```\n\n### Update `sendChat()` — try P2P first\n```javascript\nsendChat(text) {\n  if (!text || !this._connected || !this._state.room) return false;\n  const msg = { from: this.displayName || this._peerId, text, timestamp: Date.now() };\n  this._state.chatMessages.push(msg);\n  this._emit('chat', msg);\n  \n  // Try P2P via DataChannel first, fallback to relay\n  let sentP2P = false;\n  for (const [pid, ps] of this._peers) {\n    if (ps && ps.dc && ps.dc.readyState === 'open') {\n      try { ps.dc.send(JSON.stringify({ type: 'chat', from: msg.from, text: msg.text, timestamp: msg.timestamp })); sentP2P = true; } catch (_) {}\n    }\n  }\n  // Always also send chat-backup to server for persistence\n  this._send({ type: 'chat-backup', room: this._state.room, text, from: msg.from, timestamp: msg.timestamp });\n  \n  // Only relay if no P2P available\n  if (!sentP2P) {\n    const payload = { type: 'chat', from: msg.from, text: msg.text, timestamp: msg.timestamp, msgId: this._uuid() };\n    for (const [pid] of this._peers) {\n      this._send({ type: 'relay-data', room: this._state.room, to: pid, data: payload });\n    }\n  }\n  return true;\n}\n```\n\n### Update `_sendNextFile()` — try P2P DataChannel for chunks\n```javascript\n// In the chunk loop, try P2P DC first\nconst ps = this._peers.get(peerId);\nconst useDc = ps && ps.dc && ps.dc.readyState === 'open';\n\nif (useDc) {\n  // Send raw ArrayBuffer over DataChannel (no base64 — 0% overhead!)\n  const meta = { type: 'file-meta', fileId, name, size: file.size, chunks: totalChunks };\n  if (sha256) meta.sha256 = sha256;\n  ps.dc.send(JSON.stringify(meta));\n  \n  for (let i = 0; i < totalChunks; i++) {\n    const start = i * chunkSize;\n    if (ps.dc.bufferedAmount > 65536) {\n      await new Promise(r => { ps.dc.addEventListener('bufferedamountlow', r, { once: true }); });\n    }\n    try { ps.dc.send(buffer.slice(start, start + Math.min(chunkSize, buffer.byteLength - start))); } catch (_) {}\n    this._emit('file-progress', { peerId, fileId, name, progress: Math.round((i+1)/totalChunks*100), status: 'sending' });\n  }\n  ps.dc.send(JSON.stringify({ type: 'file-done', fileId }));\n} else {\n  // WS relay (base64) — existing code\n}\n```\n\n### On peer disconnect cleanup\nEnhance `peer_left` handler to also close PC/DC:\n```javascript\ncase 'peer_left':\n  const ps = this._peers.get(data.peerId);\n  if (ps) {\n    if (ps.dc) try { ps.dc.close(); } catch (_) {}\n    if (ps.pc) try { ps.pc.close(); } catch (_) {}\n  }\n  // ... existing cleanup ...\n  break;\n```\n\n### Auto-initiate P2P on peer join\nAfter `_peers` is updated in `room_peers`/`peer-list`/`peer_joined`, call `_connectToPeer(p.peerId)` for each new peer (except self).\n\n## Integration with countdownctrl\nAfter SDK is updated, copy to countdownctrl:\n```bash\ncp /Users/hug0.nef/PycharmProjects/vcc-countdownctrl/static/clipper-sdk.js /Users/hug0.nef/PycharmProjects/vcc-countdownctrl/static/clipper-sdk.js.bak\ncp /Users/hug0.nef/PycharmProjects/vcc-clipper/clipper-sdk.js /Users/hug0.nef/PycharmProjects/vcc-countdownctrl/static/clipper-sdk.js\n```\n\n## Tests\n1. Open 2 clipper.html tabs\n2. Open countdownctrl Clipper tab\n3. Check server logs for offer/answer/ice-candidate messages\n4. Send chat — verify it arrives\n5. Send file — verify it arrives (P2P with no base64 overhead)\n\n## Acceptance Criteria\n- [ ] SDK auto-initiates WebRTC P2P on peer join\n- [ ] offer/answer/ICE-candidate flow works via WS signaling\n- [ ] DataChannel opens successfully\n- [ ] Chat sent via P2P DC when available, relay fallback when not\n- [ ] File chunks sent raw via DC (no base64 overhead) when P2P, fallback to relay-chunk\n- [ ] transport event emitted with 'p2p' or 'relay' mode\n- [ ] PC/DC cleaned up on peer disconnect\n- [ ] Full backward compatibility with existing SDK users"
