  title: room-state 合併邏輯優化：防止幽靈復活與離線編輯遺失
  column: done
  priority: P2
  depends_on:
  - R-4
  instructions: |-
    ## Goal
    優化 `room-state` 合併邏輯，解決「幽靈復活」和「離線編輯遺失」兩個衝突風險。

    ## Files
    - `/Users/hug0.nef/PycharmProjects/vcc-clipper/clipper.html` (Read + Edit)
    - `/Users/hug0.nef/PycharmProjects/vcc-clipper/signal_server.py` (Read)

    ## Background
    目前 `room-state` 合併（clipper.html ~line 2426-2456）有兩個衝突風險：

    ### 風險 1：幽靈復活
    ```javascript
    const localOnlyPosts = APP.state.noticePosts.filter(p => !serverPostIds.has(p.id));
    APP.state.noticePosts = [...data.noticePosts, ...localOnlyPosts];
    // 如果 B 離線時 A 刪除了 post-456，重連時 server 沒有 post-456，
    // 但 B 的 localOnly 會把它加回來 → 幽靈復活
    ```

    ### 風險 2：離線編輯遺失
    ```javascript
    // 伺服器版本完全覆蓋同 id 的項目，無版本比較
    // 離線期間的編輯（如果唯讀沒攔到）會直接遺失
    ```

    ## Spec
    ### 修改 1：server 端加入 deletedIds 記錄
    在 `signal_server.py` 中：
    - 新增 `deletedPostIds`、`deletedChecklistIds`、`deletedKeyIds` 的集合記錄
    - 當收到 `notice-delete` 時，將 id 加入 `deletedPostIds`
    - `room-state` 回應中加入 `deletedNoticeIds`、`deletedChecklistIds`、`deletedKeyIds` 陣列

    ### 修改 2：前端合併邏輯改進
    在 `clipper.html` 的 `case 'room-state':` 中：

    ```javascript
    // 1. 先過濾掉已被伺服器刪除的本地項目（防止幽靈復活）
    if (data.deletedNoticeIds) {
        const deletedSet = new Set(data.deletedNoticeIds);
        APP.state.noticePosts = APP.state.noticePosts.filter(p => !deletedSet.has(p.id));
    }
    // 2. 正常的 server + localOnly 合併
    const serverPostIds = new Set(data.noticePosts.map(p => p.id));
    const localOnlyPosts = APP.state.noticePosts.filter(p => !serverPostIds.has(p.id));
    APP.state.noticePosts = [...data.noticePosts, ...localOnlyPosts];
    ```

    對 checklists 和 keyManagements 也做同樣處理。

    ### 修改 3：時間戳比較（可選）
    若項目有 `updatedAt` 欄位，當 server 和 local 有同 id 項目時，取較新的 `updatedAt`：
    ```javascript
    for (const serverPost of data.noticePosts) {
        const localPost = APP.state.noticePosts.find(p => p.id === serverPost.id);
        if (localPost && localPost.updatedAt && serverPost.updatedAt) {
            if (localPost.updatedAt > serverPost.updatedAt) {
                // keep local version — send an update to server
                sendWsMessage({type: 'notice-edit', room: APP.state.room, ...localPost});
            }
        }
    }
    ```

    但這需要所有 server 回應也包含 `updatedAt`。

    ## Requirements
    1. 伺服器記錄已刪除的項目 ID
    2. 前端合併時過濾掉已被伺服器刪除的項目
    3. （可選）支援 `updatedAt` 版本比較
    4. 向後相容 — 伺服器不發 `deletedIds` 時，前端倒退為現有行為

    ## Tests
    1. 連線後 A 刪除一個公告
    2. B 離線重連 → 確認公告不會從 B 的 localStorage 幽靈復活
    3. 連線狀態下同時編輯同一公告 → 取 updatedAt 較新的版本

    ## Acceptance Criteria
    - [ ] 伺服器端記錄已刪除的 IDs
    - [ ] 前端合併時過濾被刪除的項目，防止幽靈復活
    - [ ] 向後相容（舊伺服器不發 deletedIds 不影響功能）
