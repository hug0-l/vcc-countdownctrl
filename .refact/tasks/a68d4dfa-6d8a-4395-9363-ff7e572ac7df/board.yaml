  - R-1
  instructions: |-
    ## Goal
    在 WebSocket 的 `onclose`/`onopen`/`onerror` 以及 `handleWsMessage` 的 `joined` case 中自動觸發 `setReadOnly`。

    ## Files
    - `/Users/hug0.nef/PycharmProjects/vcc-clipper/clipper.html` (Read + Edit)

    ## Spec
    ### 修改位置
    1. **`connectWebSocket()` 內的 `ws.onclose`**（約 line 2270-2285）：
       - 判斷是否為 `intentionalDisconnect`（手動中斷）
       - 若非手動中斷且之前有房間（`hadRoom`）→ 呼叫 `setReadOnly(true)`
       - 若為手動中斷 → 呼叫 `setReadOnly(false)`（因為使用者主動離開，沒有衝突風險）

    2. **`connectWebSocket()` 內的 `ws.onerror`**（約 line 2266）：
       - 收到 error 時若已有房間 → 呼叫 `setReadOnly(true)`

    3. **`handleWsMessage()` 內 `case 'joined':`**（約 line 2320-2350）：
       - 加入房間成功後 → 呼叫 `setReadOnly(false)`（解除唯讀）

    4. **初始頁面尚未連線時（`updateStatus('disconnected')`）**：
       - 僅第一次載入時若從未連線過 → 不進入唯讀模式

    5. **`disconnect()` 函式或「中斷」按鈕點擊後**：
       - 設定 `APP.state.intentionalDisconnect = true`
       - 在 `ws.onclose` 中檢查此旗標，手動中斷不觸發唯讀

    ## Requirements
    - WS 非預期斷線（`onclose` + `!APP.state.intentionalDisconnect` + `hadRoom`）→ 自動 `setReadOnly(true)`
    - 重連成功（收到 `joined` 訊息）→ 自動 `setReadOnly(false)`
    - 手動按「中斷」→ `setReadOnly(false)` 並退出房間
    - 首次頁面載入尚未連線前 → 不進入唯讀模式

    ## Tests
    手動測試：
    1. 連線後中斷伺服器（關閉 `python3 signal_server.py`）→ 應自動進入唯讀
    2. 重啟伺服器、重新連線 → 應自動解除唯讀
    3. 按「中斷」按鈕 → 不應進入唯讀模式
    4. 首次開啟頁面（未連線）→ 不應進入唯讀模式

    ## Acceptance Criteria
    - [ ] WS 非預期斷線時自動進入唯讀
    - [ ] 重連成功後自動解除唯讀
    - [ ] 手動中斷不觸發唯讀
    - [ ] 初始未連線狀態不觸發唯讀
