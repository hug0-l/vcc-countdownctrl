  instructions: |-
    ## Goal
    建立 `protocol.md` 文件，完整記錄 Clipper WebSocket 通訊協議的所有 message types，供外部應用接入參考。

    ## Files
    - `/Users/hug0.nef/PycharmProjects/vcc-clipper/protocol.md` (Create)

    ## Spec
    ### 1. 總覽
    - 連線方式：`ws://localhost:8765`
    - 房間模式：4 位數字配對碼
    - 訊息格式：JSON text frames
    - 傳輸模式：P2P (WebRTC DataChannel) + WS Relay 後備

    ### 2. 連線流程（文字流程圖）
    ```
    客戶端                    Clipper 信令伺服器
      │                            │
      │── WebSocket connect ──────►│
      │                            │
      │── {"type":"join",          │
      │    "room":"1234",          │
      │    "displayName":"VPRE"}──►│
      │                            │
      │◄── {"type":"joined",       │
      │     "room":"1234",         │
      │     "peerId":"a1b2c3d4"}── │
      │                            │
      │◄── {"type":"room-state",   │
      │     "noticePosts":[],      │
      │     "checklists":[],...}── │
    ```

    ### 3. 每個 Message Type 需包含
    ```markdown
    ### `type_name`
    - **方向**: Client→Server / Server→Client / 雙向
    - **說明**: 用途說明
    - **Request**:
      ```json
      {"type": "type_name", "room": "1234", ...}
      ```
    - **Response**:
      ```json
      {"type": "response_type", ...}
      ```
    - **注意事項**: 邊界條件、錯誤處理等
    ```

    ### 4. 必須涵蓋的 Message Types（至少 20+）
    - generate/generated — 建立房間
    - join/joined — 加入房間
    - ping/pong — 心跳
    - chat — 即時聊天
    - chat-backup — 聊天備份
    - notice-create/edit/delete/pin — 公告 CRUD
    - checklistboard-create/edit/delete/pin/remind — 檢查清單 Board
    - checklist-add/toggle/delete/reset — 檢查清單項目
    - keymgmt-create/edit/delete/toggle-active/set-program — 密鑰管理
    - offer/answer/ice-candidate — WebRTC 信令
    - relay-data/relay-chunk/file-cancel — WS 中繼
    - state-get/room-state — 狀態同步
    - time-request/time-sync — NTP 時間
    - peer-joined/peer-left/peer-list/room_peers — 成員管理
    - register-name/name-resolved — 名稱註冊
    - admin-login/admin-logout/admin-dump/admin-config — 管理功能
    - error/room_full — 錯誤處理

    ### 5. 特殊章節
    - 房間狀態合併演算法（含 deleted*Ids 防幽靈復活）
    - 離線唯讀保護機制
    - 重連與狀態同步流程
    - 錯誤碼對照表

    ### 6. 連線流程 ASCII diagram
    使用 mermaid 或 ASCII art 繪製

    ## Requirements
    1. 使用正體中文撰寫
    2. Markdown 格式
    3. 每個 type 都有 Request/Response 範例
    4. 至少 20+ message types

    ## Acceptance Criteria
    - [ ] protocol.md 已建立
    - [ ] 涵蓋所有主要 message type
    - [ ] 每個 type 有 Request/Response 範例
    - [ ] 包含連線流程圖
    - [ ] 包含錯誤處理章節
