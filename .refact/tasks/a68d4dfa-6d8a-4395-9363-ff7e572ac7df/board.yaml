- id: F-1
  title: Clipper 檔案傳輸實作：SDK + countdownctrl UI + 跨 client 測試
  column: done
  priority: P1
  depends_on: []
  instructions: |-
    ## Goal
    在 clipper-sdk.js 和 countdownctrl Clipper 分頁中實作完整的檔案傳輸功能，支援不同 client 之間互傳小檔案和大檔案。

    ## Files
    - `/Users/hug0.nef/PycharmProjects/vcc-clipper/clipper-sdk.js` (Edit - source of truth SDK)
    - `/Users/hug0.nef/PycharmProjects/vcc-countdownctrl/templates/index.html` (Edit - UI)
    - `/Users/hug0.nef/PycharmProjects/vcc-countdownctrl/static/clipper-sdk.js` (Copy from vcc-clipper after edit)

    ## Background
    已有完整的 server 端 relay-chunk / file-cancel 支援（signal_server.py line 1199-1229）：
    ```javascript
    // Server relay-chunk protocol
    Client → Server: {type: "relay-chunk", room, to, fileId, chunk(b64), index, total}
    Server → Peer:   {type: "relay-chunk", from, fileId, chunk(b64), index, total}

    // file-cancel
    Client → Server: {type: "file-cancel", room, to, fileId}
    Server → Peer:   {type: "file-cancel", from, fileId}
    ```

    原生 clipper.html 已有完整實作可參考：
    - sendFileToPeer(): line 4449-4519 — chunked relay transfer with SHA-256
    - handleFileMeta(): line 4558 — receive file metadata
    - handleFileDone(): line 4588 — reassemble and download
    - relay-chunk receive: line 2790 — base64 chunk assembly
    - handleFiles(): line 4272 — drag/drop file input

    ## Spec

    ### Part 1: clipper-sdk.js 擴充

    #### 新增方法
    ```javascript
    // 選擇檔案（觸發 file picker dialog）
    pickFiles()

    // 發送檔案到指定 peer
    sendFile(peerId, file)

    // 取消傳送
    cancelFile(peerId, fileId)
    ```

    #### 新增事件
    ```javascript
    // 收到檔案 metadata（準備接收）
    on('file-meta', (meta) => { meta.fileId, meta.name, meta.size, meta.chunks, meta.sha256, meta.from })

    // 收到檔案 chunk（進度更新）
    on('file-chunk', (chunk) => { chunk.fileId, chunk.index, chunk.total, chunk.progress })

    // 檔案接收完成，準備下載
    on('file-done', (done) => { done.fileId, done.name, done.blob })

    // 檔案傳送進度更新
    on('file-progress', (progress) => { progress.peerId, progress.fileId, progress.name, progress.progress, progress.status })

    // 傳送完成
    on('file-sent', (sent) => { sent.peerId, sent.fileId, sent.name })

    // 傳送錯誤
    on('file-error', (err) => { err.peerId, err.fileId, err.message })
    ```

    #### 內部實作細節

    **sendFile(peerId, file)**:
    ```javascript
    // 1. 讀取 file 為 ArrayBuffer
    const buffer = await file.arrayBuffer();
    // 2. 計算 SHA-256（可選）
    // 3. 發送 file-meta via relay-data
    this._send({type: 'relay-data', room, to: peerId, data: {
        type: 'file-meta',
        fileId: uuid,
        name: file.name,
        size: file.size,
        chunks: totalChunks,
        sha256: checksum
    }});
    // 4. 逐 chunk 發送 relay-chunk（64KB）
    for (let i = 0; i < totalChunks; i++) {
        const chunk = buffer.slice(i*65536, (i+1)*65536);
        // base64 encode
        const b64 = await blobToBase64(new Blob([chunk]));
        this._send({type: 'relay-chunk', room, to: peerId, fileId, chunk: b64, index: i, total: totalChunks});
        await sleep(10); // 避免 WS flood
        this._emit('file-progress', {peerId, fileId, name: file.name, progress: Math.round((i+1)/totalChunks*100), status: 'sending'});
    }
    // 5. 發送 file-done
    this._send({type: 'relay-data', room, to: peerId, data: {type: 'file-done', fileId}});
    this._emit('file-sent', {peerId, fileId, name: file.name});
    ```

    **handleFileMeta / relay-chunk / file-done receive** (在 _handleMessage 中):
    ```javascript
    // 攔截 relay-data 中的 file-meta
    if (data.data && data.data.type === 'file-meta') {
        this._fileReceives.set(data.data.fileId, {
            fileId: data.data.fileId,
            name: data.data.name,
            size: data.data.size,
            chunks: data.data.chunks || 0,
            sha256: data.data.sha256 || null,
            received: 0,
            blobs: [],
            chunkCount: 0,
            from: data.from,
            status: 'receiving'
        });
        this._emit('file-meta', data.data);
    }

    // 攔截 relay-chunk
    case 'relay-chunk':
        const entry = this._fileReceives.get(data.fileId);
        if (entry) {
            const binaryStr = atob(data.chunk);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
            entry.blobs.push(bytes.buffer);
            entry.received += bytes.length;
            entry.chunkCount = (entry.chunkCount || 0) + 1;
            const progress = entry.chunks > 0 ? Math.round(entry.chunkCount / entry.chunks * 100) : Math.round(entry.received / entry.size * 100);
            entry.progress = progress;
            if (progress % 10 === 0 || progress === 100) {
                this._emit('file-chunk', {fileId: data.fileId, index: data.index, total: data.total, progress, from: data.from});
            }
        }

    // 攔截 file-done
    if (data.data && data.data.type === 'file-done') {
        const entry = this._fileReceives.get(data.data.fileId);
        if (entry && entry.status !== 'cancelled') {
            entry.status = 'done';
            const blob = new Blob(entry.blobs);
            // Optional: SHA-256 verification
            this._emit('file-done', {fileId: data.data.fileId, name: entry.name, blob, size: entry.size, from: entry.from});
        }
    }
    ```

    ### Part 2: countdownctrl index.html 檔案傳輸 UI

    取代現有的「尚待支援」靜態提示為完整檔案傳輸 UI：

    ```html
    <!-- 檔案傳輸區 -->
    <div style="margin-top:12px; padding-top:12px; border-top:1px solid #1f2937;">
        <div style="font-size:12px; color:#64748b; margin-bottom:8px; display:flex; align-items:center; gap:6px;">
            <span>📁 檔案傳輸</span>
            <span style="flex:1;"></span>
            <span id="clipperFileStatus" style="font-size:10px;">就緒</span>
        </div>
        <!-- 拖放區 -->
        <div id="clipperFileDropZone"
             style="border:2px dashed #334155; border-radius:8px; padding:20px; text-align:center; cursor:pointer; color:#94a3b8; font-size:13px;"
             ondragover="event.preventDefault();this.style.borderColor='#38bdf8';this.style.background='rgba(56,189,248,0.05)';"
             ondragleave="this.style.borderColor='#334155';this.style.background='';"
             ondrop="event.preventDefault();this.style.borderColor='#334155';this.style.background='';clipperHandleDrop(event.dataTransfer.files);"
             onclick="document.getElementById('clipperFileInput').click()">
            📁 拖曳檔案至此處，或點擊選擇檔案
        </div>
        <input type="file" id="clipperFileInput" multiple hidden onchange="clipperHandleDrop(this.files)">
        <!-- 目標選擇 -->
        <div id="clipperFileTargets" style="display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; display:none;"></div>
        <!-- 進度 -->
        <div id="clipperFileProgress" style="margin-top:6px;"></div>
        <div id="clipperFileRecvStatus" style="font-size:11px; color:#64748b; margin-top:4px;"></div>
    </div>
    ```

    #### JavaScript 整合（在 clipper SDK 事件基礎上）

    ```javascript
    // 檔案拖放/選擇處理
    function clipperHandleDrop(files) {
        if (!clipper || !clipper.connected) {
            appendClipperMsg('system', '❌ 請先連線再傳送檔案');
            return;
        }
        // 顯示目標選擇 UI
        renderFileTargets(files);
    }

    function renderFileTargets(files) {
        const container = document.getElementById('clipperFileTargets');
        container.innerHTML = '';
        container.style.display = '';
        // 遍歷 clipper._peers (Map<peerId, info>)
        for (const [peerId, info] of clipper._peers) {
            const btn = document.createElement('button');
            btn.textContent = '📤 ' + (info.displayName || peerId);
            btn.style.cssText = 'padding:4px 10px; font-size:11px; background:#1e293b; border:1px solid #334155; color:#e2e8f0; border-radius:4px; cursor:pointer;';
            btn.onclick = () => {
                container.style.display = 'none';
                for (const file of files) {
                    clipper.sendFile(peerId, file);
                }
            };
            container.appendChild(btn);
        }
    }

    // SDK 事件監聽
    clipper.on('file-progress', (p) => {
        document.getElementById('clipperFileStatus').textContent = `${p.name}: ${p.progress}%`;
    });

    clipper.on('file-sent', (s) => {
        appendClipperMsg('system', `✅ 已傳送 ${s.name} 給 ${s.peerId}`);
        document.getElementById('clipperFileStatus').textContent = '就緒';
    });

    clipper.on('file-meta', (meta) => {
        appendClipperMsg('system', `📥 正在接收檔案: ${meta.name} (${formatSize(meta.size)})`);
        document.getElementById('clipperFileRecvStatus').textContent = `📥 ${meta.name} ...`;
    });

    clipper.on('file-chunk', (chunk) => {
        document.getElementById('clipperFileRecvStatus').textContent = `📥 接收中... ${chunk.progress}%`;
    });

    clipper.on('file-done', (done) => {
        document.getElementById('clipperFileRecvStatus').textContent = '';
        // 自動下載
        const a = document.createElement('a');
        a.href = URL.createObjectURL(done.blob);
        a.download = done.name;
        a.click();
        appendClipperMsg('system', `✅ ${done.name} 下載完成`);
    });

    clipper.on('file-error', (err) => {
        appendClipperMsg('system', `❌ ${err.message}`);
    });
    ```

    ### Part 3: 同步 countdownctrl 的 SDK 副本
    ```bash
    cp /Users/hug0.nef/PycharmProjects/vcc-clipper/clipper-sdk.js /Users/hug0.nef/PycharmProjects/vcc-countdownctrl/static/clipper-sdk.js
    ```

    ## Requirements
    1. 支援從 countdownctrl Clipper 分頁拖放/選擇檔案傳送到其他 client
    2. 支援接收其他 client（原生 clipper 或其他 SDK 應用）傳來的檔案並自動下載
    3. 使用 relay-chunk 協議（64KB chunks, base64）
    4. 顯示傳送/接收進度
    5. 小檔案 (<1MB) 和大檔案 (>10MB) 都要可傳

    ## Tests
    1. 寫 Python 測試腳本模擬 2 個 client 互傳檔案
    2. 小檔案 (1KB text file)
    3. 大檔案 (10MB+)
    4. 用 countdownctrl UI + 原生 clipper 互傳

    ## Acceptance Criteria
    - [ ] SDK 可發送檔案到指定 peer
    - [ ] countdownctrl UI 可拖放/選擇檔案
    - [ ] 接收端自動下載檔案
    - [ ] 顯示進度
    - [ ] 小檔案和大檔案皆可傳
    - [ ] 原生 clipper ↔ countdownctrl 互通
