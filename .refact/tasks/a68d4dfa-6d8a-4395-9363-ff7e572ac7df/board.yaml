  instructions: |-
    ## Goal
    防止客戶端偽造 `relay-data` 中的 `from` 欄位。伺服器收到 relay-data 時忽略 client 提供的 `from`，改填真實的 `my_peer_id`。

    ## Files
    - `/Users/hug0.nef/PycharmProjects/vcc-clipper/signal_server.py` (Read + Edit)

    ## Background
    目前 relay-data 的 `from` 由客戶端提供，攻擊者可偽造身份發送聊天訊息。

    ## Spec
    ### 修改位置
    `signal_server.py` 中的 `relay-data` handler（約 line 1184）：

    ```python
    elif msg_type == "relay-data":
        rid = data.get("room")
        target = data.get("to")
        payload = data.get("data", {})
        # 🔒 SECURITY: 忽略 client 提供的 from，使用真實身份
        payload.pop("from", None)  # 移除可能偽造的 from
        out = {"type": "relay-data", "from": my_peer_id, "data": payload}
        # ... 其餘不變 ...
    ```

    ### 同樣修改 `relay-chunk`
    ```python
    elif msg_type == "relay-chunk":
        rid = data.get("room")
        target = data.get("to")
        chunk_data = {
            "type": "relay-chunk",
            "from": my_peer_id,  # 伺服器填充，忽略 client
            "fileId": data.get("fileId"),
            "chunk": data.get("chunk"),
            "index": data.get("index"),
            "total": data.get("total"),
        }
    ```

    ### 但注意 `chat-backup` 要保留 `from`
    ```python
    elif msg_type == "chat-backup":
        # chat-backup 的 from 是客戶端顯示名稱（displayName），不是 peerId，可以保留
        # 但從資料角度來看也建議由伺服器提供 my_peer_id
        ...
    ```

    ## Requirements
    1. `relay-data` 轉發時 server 填入真實 `my_peer_id` 作為 `from`
    2. `relay-chunk` 轉發時 server 填入真實 `my_peer_id`
    3. 若 `payload` 中有 `from` 欄位，移至 `data.from` 保留（供接收方顯示用）
    4. 向後相容

    ## Acceptance Criteria
    - [ ] relay-data 接收端的 `from` 是 server 填入的 peerId
    - [ ] relay-chunk 接收端的 `from` 是 server 填入的 peerId
    - [ ] 客戶端無法偽造 from
