  title: 建立 readOnly 狀態與全域唯讀開關
  column: done
  priority: P1
  depends_on: []
  instructions: |-
    ## Goal
    在 `clipper.html` 中建立 `APP.state.readOnly` 旗標與 `setReadOnly(bool)` 函式，控制全頁面唯讀模式。

    ## Files
    - `/Users/hug0.nef/PycharmProjects/vcc-clipper/clipper.html` (Read + Edit)

    ## Spec
    ### `APP.state` 新增
    ```javascript
    readOnly: false,     // 初始 false
    ```

    ### 實作 `setReadOnly(bool)` 函式
    ```javascript
    function setReadOnly(enabled) {
        APP.state.readOnly = enabled;
        if (enabled) {
            // 1. 顯示全頁頂端橫幅「🛑 信令伺服器中斷 — 唯讀模式」
            // 2. 禁用所有互動元件（按鈕、輸入框、檔案拖放區等）
            // 3. 關閉所有已開啟的 Modal/Overlay 表單
        } else {
            // 1. 移除橫幅
            // 2. 恢復所有元件可用
        }
    }
    ```

    ## Requirements
    1. `APP.state.readOnly` 初始值為 `false`
    2. `setReadOnly(true)` 時：
       - 顯示一個全頁頂端橫幅（與 `errorToast` 類似但不同設計，固定在頂部）「🛑 信令伺服器中斷 — 唯讀模式」
       - 禁用所有會觸發資料變更的 UI 元件（按鈕: `disabled` 屬性, 輸入框: `disabled`, 檔案拖放區: pointer-events none）
       - 關閉所有已開啟的 Modal 表單（如新增公告彈窗、編輯表單等），調用 `document.querySelectorAll('.modal-overlay')` 移除
    3. `setReadOnly(false)` 時：
       - 移除橫幅
       - 恢復所有元件可用（移除 disabled 屬性）
    4. 橫幅使用 CSS transition 淡入/淡出

    ## Tests
    啟動 server: `cd /Users/hug0.nef/PycharmProjects/vcc-clipper && python3 signal_server.py`
    手動測試：
    1. 打開瀏覽器，確認頁面正常載入
    2. 在 console 呼叫 `setReadOnly(true)` → 橫幅出現、按鈕禁用
    3. 在 console 呼叫 `setReadOnly(false)` → 橫幅消失、按鈕恢復

    ## Acceptance Criteria
    - [ ] `APP.state.readOnly` 存在且初始為 `false`
    - [ ] `setReadOnly(true)` 顯示橫幅、禁用元件、關閉 Modal
    - [ ] `setReadOnly(false)` 移除橫幅、恢復元件
