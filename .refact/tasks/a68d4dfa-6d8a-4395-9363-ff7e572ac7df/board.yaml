  instructions: "## Goal\n為 `signal_server.py` 中的 REST API 端點加入 token-based 認證。管理員可透過 admin 面板獲取 token。\n\n## Files\n- `/Users/hug0.nef/PycharmProjects/vcc-clipper/signal_server.py` (Read + Edit)\n\n## Background\n目前 REST API（`_mini_http` 中的 `/api/rooms/...`）完全開放，任何人都可 CRUD 資料。\n\n## Spec\n### 在 `_mini_http` 中加入認證邏輯\n對於會修改資料的方法（POST/PUT/DELETE），要求 `Authorization: Bearer <token>` header：\n\n```python\n# 在 _mini_http 中的路由判斷之前\nif method in (\"POST\", \"PUT\", \"DELETE\") and path.startswith(\"/api/rooms/\"):\n    # Extract Authorization header\n    auth_header = None\n    remaining_headers = line  # 已經讀了 request line\n    # 讀取 headers 直到空行\n    while True:\n        header_line = await asyncio.wait_for(reader.readline(), timeout=5)\n        if header_line.strip() == b\"\":\n            break\n        decoded = header_line.decode(errors=\"replace\").strip()\n        if decoded.lower().startswith(\"authorization:\"):\n            auth_header = decoded[len(\"authorization:\"):].strip()\n    \n    token = None\n    if auth_header and auth_header.lower().startswith(\"bearer \"):\n        token = auth_header[7:]\n    \n    if not _verify_session(token):\n        await _api_send_json(writer, {\"error\": \"unauthorized\", \"message\": \"Authentication required\"}, 401)\n        return\n```\n\n### 新增管理員 token 取得端點\n```\nPOST /api/admin/login  Body: {\"password\": \"xxx\"}\n  → {\"token\": \"...\", \"success\": true}\n```\n\n這個端點可以不使用 Authorization header（因為還沒登入）。\n\n### 輔助函式\n```python\nasync def _api_send_json(writer, data, status=200):\n    \"\"\"Send JSON response with CORS headers.\"\"\"\n    body = json.dumps(data)\n    response = (\n        f\"HTTP/1.1 {status} {'OK' if status == 200 else 'Unauthorized' if status == 401 else 'Forbidden'}\\r\\n\"\n        f\"Content-Type: application/json\\r\\n\"\n        f\"Content-Length: {len(body)}\\r\\n\"\n        f\"Access-Control-Allow-Origin: *\\r\\n\"\n        f\"Access-Control-Allow-Methods: GET, POST, PUT, DELETE, OPTIONS\\r\\n\"\n        f\"Access-Control-Allow-Headers: Authorization, Content-Type\\r\\n\"\n        f\"Cache-Control: no-cache\\r\\n\"\n        f\"\\r\\n\"\n        f\"{body}\"\n    )\n    writer.write(response.encode())\n    await writer.drain()\n    writer.close()\n```\n\n### GET 端點（state, health, chats）不需要認證\n讀取類操作保持開放，方便外部應用唯讀查詢。\n\n## Requirements\n1. POST/PUT/DELETE 需要 Bearer token\n2. GET 端點維持開放\n3. CORS headers 支援 preflight (OPTIONS)\n4. 向後相容\n\n## Acceptance Criteria\n- [ ] 無 token 時 POST notice 回傳 401\n- [ ] 帶有效 token 時 POST notice 成功\n- [ ] GET state 不需 token\n- [ ] OPTIONS preflight 正常回應"
