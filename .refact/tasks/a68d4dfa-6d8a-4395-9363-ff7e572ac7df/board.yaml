  instructions: "## Goal\n將 countdownctrl VCC PRE 的 Clipper IM 分頁從簡化版自製協議改為對接完整 Clipper SDK，讓它真正可用。預設顯示名稱改回 VPRE。\n\n## Files\n- `/Users/hug0.nef/PycharmProjects/vcc-countdownctrl/templates/index.html` (Read + Edit)\n- `/Users/hug0.nef/PycharmProjects/vcc-clipper/clipper-sdk.js` → copy to `/Users/hug0.nef/PycharmProjects/vcc-countdownctrl/static/clipper-sdk.js`\n\n## Spec\n### 步驟 1：複製 SDK\n```bash\ncp /Users/hug0.nef/PycharmProjects/vcc-clipper/clipper-sdk.js /Users/hug0.nef/PycharmProjects/vcc-countdownctrl/static/clipper-sdk.js\n```\n\n### 步驟 2：引入 SDK\n在 index.html 的 `<script>` 之前或開頭加入：\n```html\n<script src=\"/static/clipper-sdk.js\"></script>\n```\n\n### 步驟 3：替換 JS 實作\n將現有自製協議（clipperConnect, clipperSendMsg, handleClipperMessage, clipperWs, clipperConnected 等約 200+ 行）替換為 SDK 整合：\n\n```javascript\nlet clipper = null;\n\nfunction clipperConnect() {\n    const url = document.getElementById('clipperServerUrl').value.trim() || 'ws://localhost:8765';\n    const room = document.getElementById('clipperRoomCode').value.trim() || '1234';\n    const displayName = document.getElementById('clipperDisplayName').textContent.trim() || 'VPRE';\n    \n    if (clipper) { clipper.disconnect(); }\n    \n    clipper = new ClipperSDK({ server: url, room, displayName });\n    \n    clipper.on('connected', () => {\n        updateClipperStatus('connected', '🟢 已連線');\n        appendClipperMsg('system', '✅ 已加入房間');\n    });\n    \n    clipper.on('disconnected', () => {\n        updateClipperStatus('disconnected', '🔴 未連線');\n        appendClipperMsg('system', '⚠️ 與伺服器斷線');\n    });\n    \n    clipper.on('chat', (msg) => {\n        appendClipperMsg('peer', msg.text, msg.from);\n    });\n    \n    clipper.on('peer-joined', (peer) => {\n        appendClipperMsg('system', '👤 ' + (peer.displayName || peer.peerId) + ' 加入了房間');\n    });\n    \n    clipper.on('peer-left', (peerId) => {\n        appendClipperMsg('system', '👋 ' + peerId + ' 離開了房間');\n    });\n    \n    clipper.on('error', (err) => {\n        appendClipperMsg('system', '❌ ' + (err.message || '未知錯誤'));\n    });\n    \n    clipper.connect();\n}\n\nfunction clipperSendMsg() {\n    const input = document.getElementById('clipperInput');\n    const text = input.value.trim();\n    if (!text || !clipper) return;\n    \n    if (clipper.sendChat(text)) {\n        appendClipperMsg('self', text, clipper.displayName);\n        input.value = '';\n    } else {\n        appendClipperMsg('system', '❌ 無法發送，請確認已連線');\n    }\n}\n```\n\n### 步驟 4：保留現有 UI 輔助函數\n保留 `appendClipperMsg`, `updateClipperStatus`, `escapeHtml` 和 `showClipperNotif`\n\n### 步驟 5：displayName = VPRE（確認）\n現有程式碼已包含 `'VPRE'` 預設值，保持不變：\n```javascript\nconst savedClipperName = localStorage.getItem('vcc_clipper_name') || 'VPRE';\n```\n\n## Requirements\n1. Clipper 分頁成功連接 Clipper WebSocket 伺服器\n2. 發送/接收聊天訊息正常\n3. 接收公告通知\n4. 斷線重連\n5. 預設顯示名稱 VPRE\n6. 所有其他 countdownctrl 分頁不受影響\n\n## Acceptance Criteria\n- [ ] 啟動 signal_server.py 後，開啟 countdownctrl，切到 Clipper 分頁 → 自動連線\n- [ ] 發送訊息成功\n- [ ] 另一客戶端發送訊息可收到\n- [ ] 中斷伺服器後顯示斷線提示\n- [ ] 預設名稱 VPRE"
