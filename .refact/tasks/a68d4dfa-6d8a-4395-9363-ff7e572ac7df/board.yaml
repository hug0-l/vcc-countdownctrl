- id: R-6
  title: 啟動 signal server 時自動開啟瀏覽器跳轉 client
  column: done
  priority: P2
  depends_on: []
  instructions: |-
    ## Goal
    在 `signal_server.py` 啟動完成後自動用瀏覽器開啟 `http://localhost:8766`（Clipper 客戶端頁面）。

    ## Files
    - `/Users/hug0.nef/PycharmProjects/vcc-clipper/signal_server.py` (Read + Edit)

    ## Spec
    ### 修改位置
    在 `async def main()` 函式中，兩個伺服器都已啟動後、`await stop` 之前，加入自動開啟瀏覽器。

    ```python
    # 找到這行（line 1385）附近
    _log('STARTUP', 'listening on ws://localhost:8765  |  http://localhost:8766')

    # 在那之後、await stop 之前加入
    import webbrowser
    webbrowser.open('http://localhost:8766')
    ```

    ### 實際修改
    在 `signal_server.py` 的 `main()` 函式中，約 line 1385（`_log` 顯示 listening 那行）後面，server 都啟動完成後，加入：

    ```python
        # Auto-open browser to client page
        try:
            import webbrowser
            webbrowser.open('http://localhost:8766')
        except Exception:
            pass  # headless environment: silently ignore
    ```

    ### 放置邏輯
    因為 `await stop` 會永遠 blocking，所以 `webbrowser.open` 必須放在**之前**。建議在 `async with websockets.serve(handler, "0.0.0.0", 8765):` 區塊**內**、`await stop` **前**：

    ```python
        async with websockets.serve(handler, "0.0.0.0", 8765):
            # Auto-open browser to client page
            try:
                import webbrowser
                webbrowser.open('http://localhost:8766')
            except Exception:
                pass
            await stop
    ```

    ## Requirements
    1. 只在 `python3 signal_server.py` 直接執行時自動跳轉（不影響其他匯入方式）
    2. headless 環境（無桌面、無瀏覽器）時優雅降級，不報錯
    3. 任何異常都被 `try/except` 捕獲，不影響伺服器啟動

    ## Tests
    1. 執行 `python3 signal_server.py`
    2. 確認瀏覽器自動跳轉到 `http://localhost:8766`
    3. 在 headless 環境（如 SSH）執行，應不報錯

    ## Acceptance Criteria
    - [ ] 啟動後瀏覽器自動開啟 Clipper 客戶端
    - [ ] headless 環境優雅降級不報錯
