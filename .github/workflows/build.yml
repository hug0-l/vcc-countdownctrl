name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm county.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: County-Windows
          path: dist/County.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm county.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: County-macOS
          path: dist/County

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: County-Windows
          path: ./dist-windows
      - uses: actions/download-artifact@v4
        with:
          name: County-macOS
          path: ./dist-macos

      - name: Display structure
        run: ls -R ./dist-windows ./dist-macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist-windows/County.exe
            ./dist-macos/County
          generate_release_notes: true
          body: |
            ## County — 廣播排控倒數系統

            ### 下載
            - **Windows**: `County.exe` (一鍵執行)
            - **macOS**: `County` (一鍵執行)

            ### 使用方式
            下載後直接雙擊執行，瀏覽器自動開啟 http://localhost:8000

            ### Windows 注意
            Windows Defender 可能提示「已防止無法辨識的應用程式啟動」，點「更多資訊」→「仍要執行」即可。
